<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CareConnect</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Redirects 404s back to index.html with the original path as a query param.
      // See: https://github.com/rafgraph/spa-github-pages
      const l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
